<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Offline-first notes, todos, audio, and images. Installable PWA." />
    <title>Notes</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./assets/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  </head>
  <body>
    <div id="app" class="app">
      <aside class="sidebar" aria-label="Library">
        <header class="sidebar__header sidebar__header--stack">
          <div class="sidebar__head-row">
            <h1 class="sidebar__title">Notes</h1>
          </div>
          <div id="creation-modes" class="creation-modes" aria-label="New entry type"></div>
          <div class="sidebar__actions">
            <button type="button" id="btn-new" class="btn btn--primary sidebar__new">New</button>
          </div>
        </header>
        <div id="note-list" class="note-list" role="list"></div>
      </aside>
      <main class="editor" aria-label="Editor">
        <div id="editor-empty" class="editor__empty">
          <p>Select an entry or create one.</p>
        </div>
        <div id="editor-form" class="editor__form" hidden>
          <div class="editor__toolbar">
            <input
              type="text"
              id="note-title"
              class="editor__title"
              placeholder="Title"
              maxlength="200"
              autocomplete="off"
              aria-label="Title"
            />
            <button type="button" id="btn-delete" class="btn btn--danger">Delete</button>
          </div>
          <div id="editor-root" class="editor__region"></div>
          <p id="save-status" class="editor__status" aria-live="polite"></p>
        </div>
      </main>
    </div>

    <video id="camera-video" class="camera-video" playsinline muted autoplay hidden></video>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
